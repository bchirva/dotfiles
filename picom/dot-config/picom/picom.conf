#~~~ General Settings ~~~#

backend = "xrender";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";

#~~~ Shadows ~~~#

shadow = true;
shadow-radius = 8;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-color = "#000000"
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

#~~~ Fading ~~~#

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 10

#~~~ Transparency / Opacity ~~~#

active-opacity = 1.0
frame-opacity = 1.0
inactive-opacity = 1.0
inactive-dim = 0.0
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];

#~~~ Corners ~~~#

corner-radius = 8
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = true; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
};
